name: Test Coverage Check

# どのタイミングで動かすかを指定（mainブランチにpushされたとき）
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    # 1. GitHubのサーバーにコードを持ってくる
    - uses: actions/checkout@v4

    # 2. Node.jsの環境を準備する
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-node-version: 20
        cache: 'npm'

    # 3. 必要なパッケージを全部インストールする
    - name: Install dependencies
      run: npm ci

    # 4. テストを実行してカバレッジを測定する！
    - name: Run Test Coverage
      run: npm run test:coverage